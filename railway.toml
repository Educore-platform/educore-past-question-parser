# Railway deployment configuration.
# Docs: https://docs.railway.com/guides/config-as-code

[deploy]
# Railway injects PORT automatically — the Dockerfile CMD reads it via ${PORT:-8000}.
healthcheckPath    = "/health"
healthcheckTimeout = 300          # seconds to wait for first healthy response
restartPolicyType  = "ON_FAILURE"
restartPolicyMaxRetries = 5
